spring:
  application:
    name: backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  web:
    error:
      include-binding-errors: always
      include-message: always

server:
  port: 8080

gatelog:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expriry-ms: ${JWT_ACCESS_TOKEN_EXPRITY_MS:900000} # 15 minutes
    refresh-token-exprity-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}