services:
  postgres:
    image: postgres:16-alpine
    container_name: gatelog
    environment:
      POSTGRES_DB: gatelog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    networks:
      - gatelognet
    volumes:
      - gatelog-data:/var/lib/postgresql/data

volumes:
  gatelog-data:

networks:
  gatelognet: